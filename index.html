<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qore pookie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --pink: #ff6eb4;
    --lilac: #c084fc;
    --white: #f5f0ff;
    --glow: #ff6eb4;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    cursor: none;
    font-family: 'Space Mono', monospace;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.4;
  }

  /* ── Radial bg glow ── */
  .bg-glow {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,110,180,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 30% 20% at 20% 80%, rgba(255,110,180,0.06) 0%, transparent 60%);
    pointer-events: none;
    animation: bgPulse 6s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  /* ── Cursor ── */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--pink);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: screen;
    box-shadow: 0 0 20px var(--pink), 0 0 40px var(--pink);
  }
  #cursor-trail {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid rgba(255,110,180,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: left 0.12s ease, top 0.12s ease, width 0.2s, height 0.2s;
    mix-blend-mode: screen;
  }

  /* ── Sparkles ── */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--pink);
    mix-blend-mode: screen;
    animation: sparkFade 0.8s ease forwards;
  }
  @keyframes sparkFade {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0) translateY(-20px); opacity: 0; }
  }

  /* ── Floating particles ── */
  .particles {
    position: fixed; inset: 0;
    pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--pink);
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── Center stage ── */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    z-index: 10;
  }

  /* ── Main text ── */
  .main-text {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(4rem, 14vw, 11rem);
    line-height: 0.9;
    color: transparent;
    background: linear-gradient(135deg, #fff 0%, var(--pink) 40%, var(--lilac) 70%, #fff 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    animation: gradShift 4s ease infinite, revealText 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    letter-spacing: -0.03em;
    text-align: center;
    filter: drop-shadow(0 0 40px rgba(255,110,180,0.5));
  }
  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes revealText {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .sub-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 4vw, 2.2rem);
    color: rgba(255,110,180,0.7);
    letter-spacing: 0.15em;
    animation: revealSub 1.4s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    text-align: center;
  }
  @keyframes revealSub {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Glitch effect on hover ── */
  .main-text:hover {
    animation: gradShift 4s ease infinite, glitch 0.4s steps(2) infinite;
  }
  @keyframes glitch {
    0%   { text-shadow: 3px 0 var(--pink), -3px 0 var(--lilac); }
    25%  { text-shadow: -3px 0 var(--pink), 3px 0 var(--lilac); }
    50%  { text-shadow: 3px 2px var(--lilac), -3px -2px var(--pink); }
    75%  { text-shadow: -2px 0 var(--lilac), 2px 0 var(--pink); }
    100% { text-shadow: none; }
  }

  /* ── Orbiting ring ── */
  .ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,110,180,0.15);
    pointer-events: none;
    animation: spin linear infinite;
  }
  .ring::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    background: var(--pink);
    border-radius: 50%;
    top: -3px; left: 50%;
    box-shadow: 0 0 12px var(--pink);
  }
  @keyframes spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* ── Corner deco ── */
  .corner {
    position: fixed;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,110,180,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .corner.tl { top: 2rem; left: 2rem; }
  .corner.tr { top: 2rem; right: 2rem; text-align: right; }
  .corner.bl { bottom: 2rem; left: 2rem; }
  .corner.br { bottom: 2rem; right: 2rem; text-align: right; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<!-- Custom cursor -->
<div id="cursor"></div>
<div id="cursor-trail"></div>

<!-- Orbiting rings -->
<div class="ring" style="width:300px;height:300px;top:50%;left:50%;animation-duration:12s;"></div>
<div class="ring" style="width:500px;height:500px;top:50%;left:50%;animation-duration:20s;animation-direction:reverse;border-color:rgba(192,132,252,0.1);"></div>
<div class="ring" style="width:700px;height:700px;top:50%;left:50%;animation-duration:30s;border-color:rgba(255,110,180,0.06);"></div>

<!-- Corner decorations -->
<div class="corner tl">qore<br/>✦ 2025</div>
<div class="corner tr">∞<br/>forever</div>
<div class="corner bl">♡ ♡ ♡</div>
<div class="corner br">always<br/>& forever</div>

<!-- Main stage -->
<div class="stage">
  <div class="main-text">qore</div>
  <div class="sub-text">pookie ✦</div>
</div>

<script>
  // ── Cursor ──
  const cursor = document.getElementById('cursor');
  const trail  = document.getElementById('cursor-trail');
  let mx = 0, my = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
    setTimeout(() => {
      trail.style.left = mx + 'px';
      trail.style.top  = my + 'px';
    }, 80);
    spawnSparkle(mx, my);
  });

  // ── Sparkles on move ──
  let lastSparkle = 0;
  function spawnSparkle(x, y) {
    const now = Date.now();
    if (now - lastSparkle < 60) return;
    lastSparkle = now;
    const s = document.createElement('div');
    s.className = 'sparkle';
    const colors = ['#ff6eb4','#c084fc','#ffffff','#ffb3d9'];
    s.style.cssText = `
      left:${x + (Math.random()-0.5)*20}px;
      top:${y + (Math.random()-0.5)*20}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${3+Math.random()*5}px;
      height:${3+Math.random()*5}px;
      box-shadow:0 0 6px currentColor;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }

  // ── Floating particles ──
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    const colors = ['#ff6eb4','#c084fc','#ffb3d9','#ffffff'];
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
      box-shadow:0 0 ${size*2}px currentColor;
    `;
    pContainer.appendChild(p);
  }

  // ── Click burst ──
  document.addEventListener('click', e => {
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const angle = (i / 10) * Math.PI * 2;
        const dist = 20 + Math.random() * 30;
        s.style.cssText = `
          left:${e.clientX + Math.cos(angle)*dist}px;
          top:${e.clientY + Math.sin(angle)*dist}px;
          background:#ff6eb4;
          width:5px; height:5px;
          box-shadow:0 0 10px #ff6eb4;
        `;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 800);
      }, i * 30);
    }
  });
</script>
</body>
</html>
